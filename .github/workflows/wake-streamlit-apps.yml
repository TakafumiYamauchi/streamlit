name: Wake Streamlit apps

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

concurrency:
  group: wake-streamlit-apps
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r streamlit_random_url_opener/playwright_wake/requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Open apps and click wake button when needed
        env:
          PYTHONUNBUFFERED: "1"
        run: >
          python streamlit_random_url_opener/playwright_wake/wake_streamlit_apps.py
          --randomize-order
          --max-delay-seconds 20
